<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px; height: 1080px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: white;
  display: flex; flex-direction: column;
  padding: 60px;
  position: relative;
  overflow: hidden;
}
.bg-shape {
  position: absolute; width: 400px; height: 400px; border-radius: 50%;
  background: rgba(255, 153, 0, 0.08); filter: blur(80px);
}
.bg-shape-1 { top: -100px; right: -100px; }
.bg-shape-2 { bottom: -150px; left: -100px; }
.header { display: flex; align-items: center; gap: 16px; margin-bottom: 40px; position: relative; z-index: 1; }
.logo { font-size: 28px; font-weight: 800; color: #FF9900; }
.badge { background: #FF9900; color: #1a1a2e; font-size: 14px; font-weight: 700; padding: 6px 14px; border-radius: 20px; }
.emoji-big { font-size: 80px; margin-bottom: 30px; position: relative; z-index: 1; }
.title { font-size: 48px; font-weight: 800; line-height: 1.15; margin-bottom: 35px; position: relative; z-index: 1; }
.title span { color: #FF9900; }
.weather-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; position: relative; z-index: 1; margin-bottom: 30px; }
.weather-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; text-align: center; }
.weather-card .icon { font-size: 40px; margin-bottom: 10px; }
.weather-card .label { font-size: 18px; color: #888; margin-bottom: 4px; }
.weather-card .temp { font-size: 32px; font-weight: 800; }
.weather-card.cold .temp { color: #64b5f6; }
.weather-card.hot .temp { color: #FF9900; }
.weather-card.dry .temp { color: #ef5350; }
.weather-card.freeze .temp { color: #90caf9; }
.layers { position: relative; z-index: 1; }
.layer { display: flex; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
.layer-emoji { font-size: 28px; }
.layer-text { font-size: 24px; color: #e0e0e0; }
.layer-text strong { color: white; }
.footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 1; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 24px; }
.footer-left { font-size: 20px; color: #999; }
.footer-right { font-size: 18px; color: #FF9900; font-weight: 600; }
</style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="header">
    <div class="logo">re:Invent Planner</div>
    <div class="badge">DICA #4</div>
  </div>
  <div class="emoji-big">🥶</div>
  <div class="title">Las Vegas em dezembro é <span>deserto gelado</span></div>
  <div class="weather-grid">
    <div class="weather-card hot">
      <div class="icon">☀️</div>
      <div class="label">Dia</div>
      <div class="temp">14-18°C</div>
    </div>
    <div class="weather-card cold">
      <div class="icon">🌙</div>
      <div class="label">Noite</div>
      <div class="temp">2-6°C</div>
    </div>
    <div class="weather-card freeze">
      <div class="icon">🥶</div>
      <div class="label">Madrugada</div>
      <div class="temp">-1°C</div>
    </div>
    <div class="weather-card dry">
      <div class="icon">💧</div>
      <div class="label">Umidade</div>
      <div class="temp">10-20%</div>
    </div>
  </div>
  <div class="layers">
    <div class="layer">
      <div class="layer-emoji">👕</div>
      <div class="layer-text"><strong>Base:</strong> camiseta confortável</div>
    </div>
    <div class="layer">
      <div class="layer-emoji">🧥</div>
      <div class="layer-text"><strong>Meio:</strong> fleece ou moletom</div>
    </div>
    <div class="layer">
      <div class="layer-emoji">🧣</div>
      <div class="layer-text"><strong>Externa:</strong> jaqueta corta-vento ou puffer</div>
    </div>
  </div>
  <div class="footer">
    <div class="footer-left">🇧🇷 Comunidade AWS Brasil</div>
    <div class="footer-right">flap.github.io/reInventPlanning</div>
  </div>
</body>
</html>
